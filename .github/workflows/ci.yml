name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 8 * * 1'  # Chaque lundi à 8h00 UTC

permissions:
  contents: write
  checks: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  # ─── Angular ────────────────────────────────────────────────────────────────

  test-angular:
    name: Tests Angular
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: angular_project/node_modules
          key: angular-${{ runner.os }}-${{ hashFiles('angular_project/package-lock.json') }}
          restore-keys: angular-${{ runner.os }}-

      - name: Install dependencies
        working-directory: angular_project
        run: npm ci

      - name: Run tests
        working-directory: angular_project
        run: npm test
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Angular Tests
          path: angular_project/reports/*.xml
          reporter: java-junit

  # ─── Spring Boot ────────────────────────────────────────────────────────────

  test-java:
    name: Tests Spring Boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            java_project/.gradle
          key: java-${{ runner.os }}-${{ hashFiles('java_project/**/*.gradle*') }}
          restore-keys: java-${{ runner.os }}-

      - name: Run tests
        working-directory: java_project
        run: ./gradlew test

      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Spring Boot Tests
          path: java_project/build/test-results/test/*.xml
          reporter: java-junit

  # ─── SonarCloud ─────────────────────────────────────────────────────────────

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test-angular, test-java]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: angular_project/node_modules
          key: angular-${{ runner.os }}-${{ hashFiles('angular_project/package-lock.json') }}
          restore-keys: angular-${{ runner.os }}-

      - name: Install Angular dependencies
        working-directory: angular_project
        run: npm ci

      - name: Run Angular tests with coverage
        working-directory: angular_project
        run: npm test
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: SonarCloud Scan (Angular)
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: angular_project
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            java_project/.gradle
          key: java-${{ runner.os }}-${{ hashFiles('java_project/**/*.gradle*') }}
          restore-keys: java-${{ runner.os }}-

      - name: Run Java tests + JaCoCo coverage
        working-directory: java_project
        run: ./gradlew test jacocoTestReport

      - name: SonarCloud Analysis (Java)
        working-directory: java_project
        run: ./gradlew sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─── Build Angular ──────────────────────────────────────────────────────────

  build-angular:
    name: Build Angular Docker image
    runs-on: ubuntu-latest
    needs: test-angular
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/angular
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: angular_project
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── Build Spring Boot ──────────────────────────────────────────────────────

  build-java:
    name: Build Spring Boot Docker image
    runs-on: ubuntu-latest
    needs: test-java
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/java
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: java_project
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── Release (semantic-release) ─────────────────────────────────────────────

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-angular, build-java]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag Docker images with semantic version
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          docker pull ghcr.io/${{ github.repository }}/angular:sha-${SHORT_SHA}
          docker tag  ghcr.io/${{ github.repository }}/angular:sha-${SHORT_SHA} ghcr.io/${{ github.repository }}/angular:${VERSION}
          docker push ghcr.io/${{ github.repository }}/angular:${VERSION}

          docker pull ghcr.io/${{ github.repository }}/java:sha-${SHORT_SHA}
          docker tag  ghcr.io/${{ github.repository }}/java:sha-${SHORT_SHA} ghcr.io/${{ github.repository }}/java:${VERSION}
          docker push ghcr.io/${{ github.repository }}/java:${VERSION}
